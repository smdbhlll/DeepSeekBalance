name: 🤖 Build DeepSeek Balance APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 检出代码
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # 2️⃣ 设置 JDK 17
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3️⃣ 设置 Android SDK
      - name: 📦 Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4️⃣ 缓存 Gradle 依赖
      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5️⃣ 授权 Gradle 执行权限
      - name: 🔑 Grant execute permission
        run: chmod +x gradlew

      # 6️⃣ 构建 Debug APK（64位）
      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug

      # 7️⃣ 上传构建产物
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeepSeekBalance-v${{ github.run_number }}-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # 8️⃣ 生成版本摘要
      - name: 📋 Generate Build Summary
        run: |
          echo "## ✅ 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 构建时间 | $(date '+%Y-%m-%d %H:%M:%S') |" >> $GITHUB_STEP_SUMMARY
          echo "| 📂 提交 | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 运行编号 | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📱 目标 API | 36 (Android 16) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 下载 APK" >> $GITHUB_STEP_SUMMARY
          echo "在页面底部的 **Artifacts** 区域下载 APK 文件 👇" >> $GITHUB_STEP_SUMMARY
